name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cpp_version/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Release, MinSizeRel]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build (Release)
      if: matrix.build_type == 'Release'
      run: |
        cd cpp_version
        cl /nologo /W3 /O2 /EHsc /DNDEBUG /D "UNICODE" /D "_UNICODE" /D "WIN32" /D "_WINDOWS" main.cpp /Fe:УЄфтіетїќУ«Ау«ЌтиЦтЁи.exe /link user32.lib gdi32.lib comctl32.lib comdlg32.lib shell32.lib ole32.lib /SUBSYSTEM:WINDOWS

    - name: Build (MinSizeRel - Тюђт░ЈСйЊуД»)
      if: matrix.build_type == 'MinSizeRel'
      run: |
        cd cpp_version
        cl /nologo /W0 /O1 /Os /Oy /GF /GL /Gy /EHsc /DNDEBUG /D "UNICODE" /D "_UNICODE" /D "WIN32" /D "_WINDOWS" main.cpp /Fe:УЄфтіетїќУ«Ау«ЌтиЦтЁи_mini.exe /link user32.lib gdi32.lib comctl32.lib comdlg32.lib shell32.lib ole32.lib /SUBSYSTEM:WINDOWS /LTCG /OPT:REF /OPT:ICF /MERGE:.rdata=.text /MERGE:.pdata=.rdata

    - name: Upload artifact (Release)
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: УЄфтіетїќУ«Ау«ЌтиЦтЁи-Release
        path: cpp_version/УЄфтіетїќУ«Ау«ЌтиЦтЁи.exe

    - name: Upload artifact (MinSizeRel)
      if: matrix.build_type == 'MinSizeRel'
      uses: actions/upload-artifact@v4
      with:
        name: УЄфтіетїќУ«Ау«ЌтиЦтЁи-MinSizeRel
        path: cpp_version/УЄфтіетїќУ«Ау«ЌтиЦтЁи_mini.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Release artifact
      uses: actions/download-artifact@v4
      with:
        name: УЄфтіетїќУ«Ау«ЌтиЦтЁи-Release
        path: ./release

    - name: Download MinSizeRel artifact
      uses: actions/download-artifact@v4
      with:
        name: УЄфтіетїќУ«Ау«ЌтиЦтЁи-MinSizeRel
        path: ./mini

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.date.outputs.date }}
        name: УЄфтіетїќУ«Ау«ЌтиЦтЁи ${{ steps.date.outputs.date }}
        body: |
          ## УЄфтіетїќУ«Ау«ЌтиЦтЁи - C++ Win32уЅѕ
          
          ### ТЏ┤Тќ░тєЁт«╣
          - УЄфтіеТъёт╗║уЅѕТюг
          
          ### ТќЄС╗ХУ»┤Тўј
          - `УЄфтіетїќУ«Ау«ЌтиЦтЁи.exe` - ТаЄтЄєуЅѕТюг
          - `УЄфтіетїќУ«Ау«ЌтиЦтЁи_mini.exe` - Тюђт░ЈСйЊуД»уЅѕТюг
          
          ### тіЪУЃй
          - ТЅЊтїЁТЋ░ТЇ«ТЪЦУ»б
          - уіХТђЂтГЌТЪЦУ»б
          - тєЁтГўТўаУ▒АуйЉУ«Ау«Ќ
          - ТеАТІЪжЄЈУ«Ау«Ќ
          - жђЪт║дУйгТЇб
          
          ---
          т╝ђтЈЉУђЁ№╝џтЙижЙЎУйДжњбУЄфтіетїќтЏбжўЪ
        files: |
          release/УЄфтіетїќУ«Ау«ЌтиЦтЁи.exe
          mini/УЄфтіетїќУ«Ау«ЌтиЦтЁи_mini.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
